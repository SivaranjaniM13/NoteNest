<!DOCTYPE html>
<html>
<head>
    <title>NoteNest Web</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 16px; }
        input, button { display: block; width: 100%; margin-bottom: 10px; padding: 8px; font-size: 16px; }
        #notes div { background: #f0f0f0; padding: 10px; margin-bottom: 6px; border-radius: 6px; }
    </style>
</head>
<body>
<h2>NoteNest</h2>
<div id="auth-section">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <button onclick="googleLogin()">Sign in with Google</button>
</div>
<div id="app-section" style="display:none">
    <p id="user-info"></p>
    <input id="noteText" placeholder="Write a note...">
    <button onclick="addNote()">Add Note</button>
    <button onclick="logout()">Logout</button>
    <div id="notes"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDfavRP81xLeRNPjx03ZMXS2vnn0EnafJQ",
  authDomain: "notenest-cdb37.firebaseapp.com",
  projectId: "notenest-cdb37",
  storageBucket: "notenest-cdb37.firebasestorage.app",
  messagingSenderId: "65747374641",
  appId: "1:65747374641:web:f606a30ae782d84248fb10"
};


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    window.register = () => createUserWithEmailAndPassword(auth,
      document.getElementById('email').value, document.getElementById('password').value);
    window.login = () => signInWithEmailAndPassword(auth,
      document.getElementById('email').value, document.getElementById('password').value);
    window.googleLogin = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);
    window.addNote = () => {
      const text = document.getElementById('noteText').value;
      if (!text) return;
      addDoc(collection(db, 'notes'), { text, uid: auth.currentUser.uid });
      document.getElementById('noteText').value = '';
    };

    onAuthStateChanged(auth, user => {
      document.getElementById('auth-section').style.display = user ? 'none' : 'block';
      document.getElementById('app-section').style.display = user ? 'block' : 'none';
      if (user) {
        document.getElementById('user-info').textContent = 'Hello, ' + user.email;
        const q = query(collection(db, 'notes'), where('uid', '==', user.uid));
        onSnapshot(q, snap => {
          document.getElementById('notes').innerHTML = '';
          snap.forEach(d => {
            const div = document.createElement('div');
            div.textContent = d.data().text + ' ';
            const btn = document.createElement('button');
            btn.textContent = 'Delete'; btn.style.width = 'auto';
            btn.onclick = () => deleteDoc(doc(db, 'notes', d.id));
            div.appendChild(btn);
            document.getElementById('notes').appendChild(div);
          });
        });
      }
    });
</script>
</body>
</html>
